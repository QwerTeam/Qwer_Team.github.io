<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwer_Team</title>
  <link rel="icon" type="image/png" href="images/banka.png">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #4ade80;
      --bg: #0d0d0d;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --muted: #737373;
      --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 60% at 50% 50%, rgba(74,222,128,0.05) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(255,255,255,0.012) 31px, rgba(255,255,255,0.012) 32px),
        repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(255,255,255,0.012) 31px, rgba(255,255,255,0.012) 32px);
    }

    .intro-box {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 3rem 2rem;
      max-width: 520px;
      width: 100%;
    }

    .logo {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
      width: 100%;
    }
    .logo img { width: 44px; height: 44px; object-fit: contain; border-radius: 8px; }
    .logo-text {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.3rem; font-weight: 900;
      color: var(--green);
    }
    .logo-text span { color: var(--green); }

    .intro-title {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      animation: fadeUp 0.6s 0.1s ease both;
      opacity: 0;
    }

    .intro-sub {
      font-size: 0.9rem; color: var(--muted);
      line-height: 1.6; margin-bottom: 2.5rem;
      animation: fadeUp 0.6s 0.2s ease both;
      opacity: 0;
    }

    /* Audio player */
    .player {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.3s ease both;
      opacity: 0;
    }

    .sound-title {
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--green); margin-bottom: 1rem;
    }

    .progress-wrap {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), #86efac);
      border-radius: 999px;
      transition: width 0.3s linear;
    }

    .time-row {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: var(--muted);
      font-weight: 600;
    }

    .play-btn {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      background: var(--green);
      border: none; border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      margin: 1rem auto 0;
      transition: all 0.2s;
      color: #000;
      padding: 0;
      text-align: center;
    }
    .play-btn:hover { background: #86efac; transform: scale(1.08); }

    /* Enter button */
    .enter-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.85rem 2.5rem;
      background: var(--green);
      color: #000;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      border: none; border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      animation: none;
    }
    .enter-btn.ready {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
      transition: opacity 0.4s ease, transform 0.4s ease, background 0.2s;
    }
    .enter-btn.ready:hover { background: #86efac; transform: translateY(-2px); }

    .skip-hint {
      margin-top: 1rem;
      font-size: 0.75rem; color: #444;
      animation: fadeUp 0.6s 0.4s ease both;
      opacity: 0;
    }
    .skip-hint span { color: var(--muted); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="intro-box">
  <div class="logo">
    <img src="images/banka.png" alt="logo">
    <div class="logo-text">Qwer<span>_Team</span></div>
  </div>

  <div class="intro-title">Прежде чем войти...</div>
  <p class="intro-sub">Послушай это до конца. Мы не торопим.<br>Ну почти.</p>

  <div class="player">
    <div class="sound-title" id="soundTitle">🎵 Загрузка...</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>
  <button class="play-btn" id="playBtn" onclick="togglePlay()">
    <svg id="playIcon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
    <svg id="pauseIcon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
  </button>
  </div>

  <a href="index.html" class="enter-btn" id="enterBtn">Войти на сайт →</a>
  <p class="skip-hint" id="skipHint">Кнопка появится через <span id="countdown">10</span> сек...</p>
</div>

  ];

  const chosen = sounds[Math.floor(Math.random() * sounds.length)];
  const audio = new Audio(chosen.src);

  document.getElementById('soundTitle').textContent = '🎵 ' + chosen.title;

  let playing = false;
  let skipTimer = null;
  let countdownVal = 10;
  let skipStarted = false;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('totalTime').textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('currentTime').textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => {
    document.getElementById('playIcon').style.display = '';
    document.getElementById('pauseIcon').style.display = 'none';
    playing = false;
    unlockEntry();
  });

  function togglePlay() {
    if (playing) {
      audio.pause();
      document.getElementById('playIcon').style.display = '';
      document.getElementById('pauseIcon').style.display = 'none';
      playing = false;
    } else {
      audio.play();
      document.getElementById('playIcon').style.display = 'none';
      document.getElementById('pauseIcon').style.display = '';
      playing = true;
      if (!skipStarted) startSkipTimer();
    }
  }

  function startSkipTimer() {
    skipStarted = true;
    skipTimer = setInterval(() => {
      countdownVal--;
      document.getElementById('countdown').textContent = countdownVal;
      if (countdownVal <= 0) {
        clearInterval(skipTimer);
        document.getElementById('skipHint').innerHTML = 'Или <span style="color:var(--green);cursor:pointer;text-decoration:underline" onclick="unlockEntry()">пропустить</span>';
      }
    }, 1000);
  }

  function unlockEntry() {
    const btn = document.getElementById('enterBtn');
    btn.classList.add('ready');
    document.getElementById('skipHint').style.display = 'none';
  }

  // Auto-play attempt
  window.addEventListener('click', () => {
    if (!playing && !skipStarted) togglePlay();
  }, { once: true });
</script>
